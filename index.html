<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>解鎖地球 — 互動旅遊地圖</title>
  <meta name="description" content="解鎖地球 Podcast：旅行、歷史、文化。在地圖上探索每一集的目的地。">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <!-- Marker Cluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Klee+One:wght@400;600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css?v=20">
</head>
<body>

  <!-- ── Header ── -->
  <header id="header">
    <div class="logo">
      <img src="assets/logo-circle.png" alt="解鎖地球" class="logo-img">
      <div class="logo-text">
        <span class="logo-title">解鎖地球</span>
        <span class="logo-sub">旅行 · 歷史 · 文化</span>
      </div>
    </div>
    <div class="header-right">
      <div class="stats" id="stats">
        <span class="stat" id="stat-eps">— 集</span>
        <span class="stat-sep">·</span>
        <span class="stat" id="stat-dest">— 個目的地</span>
      </div>
      <a href="london.html" class="btn-list btn-london" title="Craig 的倫敦地圖">
        🇬🇧 倫敦特輯
      </a>
      <button id="timeline-btn" class="btn-list btn-timeline" title="節目世界觀時間線" style="display:none">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <line x1="2" y1="12" x2="22" y2="12"/>
          <circle cx="6"  cy="12" r="2.5" fill="currentColor" stroke="none"/>
          <circle cx="13" cy="12" r="2.5" fill="currentColor" stroke="none"/>
          <circle cx="19" cy="12" r="2.5" fill="currentColor" stroke="none"/>
          <line x1="6"  y1="12" x2="6"  y2="6"/>
          <line x1="13" y1="12" x2="13" y2="17"/>
          <line x1="19" y1="12" x2="19" y2="7"/>
        </svg>
        時間線
      </button>
      <button id="theme-toggle" class="btn-icon" aria-label="切換主題" title="切換 Dark / Light 模式">
        <svg id="icon-moon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg id="icon-sun" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
      <button id="toggle-panel" class="btn-list" aria-label="開啟集數列表">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
          <line x1="8" y1="18" x2="21" y2="18"/>
          <circle cx="3" cy="6" r="1" fill="currentColor"/><circle cx="3" cy="12" r="1" fill="currentColor"/>
          <circle cx="3" cy="18" r="1" fill="currentColor"/>
        </svg>
        所有集數
      </button>
    </div>
  </header>

  <!-- ── Map ── -->
  <div id="map"></div>

  <!-- ── Visited Mode Float Button ── -->
  <button id="visited-btn" class="btn-visited-float" title="標記我去過的國家">✈️</button>

  <!-- ── Visited Overlay (result + share) ── -->
  <div id="visited-overlay" class="visited-overlay">
    <div class="visited-overlay-card">
      <div class="visited-tier-illu" id="visited-tier-illu"></div>
      <div class="visited-tier-title" id="visited-tier-title"></div>
      <div class="visited-tier-sub" id="visited-tier-sub"></div>
      <div class="visited-pct-big" id="visited-pct-text">0%</div>
      <div class="visited-pct-label">解鎖地球</div>
      <div class="visited-stats-sub" id="visited-stats-row"></div>
      <div class="visited-chips-wrap" id="visited-chips"></div>
      <div class="visited-overlay-actions">
        <button class="btn-share-visited" onclick="copyVisitedShareUrl()">🔗 複製分享連結</button>
        <button class="btn-visited-continue" onclick="hideVisitedOverlay()">繼續標記</button>
      </div>
    </div>
  </div>

  <!-- ── Copy Toast ── -->
  <div id="copy-toast" class="copy-toast">已複製連結 ✓</div>
  <!-- ── Country Tooltip ── -->
  <div id="country-tooltip" class="country-tooltip"></div>

  <!-- ── Side Panel ── -->
  <aside id="panel">
    <div class="panel-header">
      <div class="panel-title-row">
        <h2>集數列表</h2>
        <button id="close-panel" aria-label="關閉">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="search-box">
        <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="search-input" placeholder="搜尋目的地或集數…" autocomplete="off">
        <button id="clear-search" class="clear-btn" aria-label="清除">✕</button>
      </div>
      <div class="region-filters" id="region-filters">
        <button class="pill active" data-region="all">全部</button>
        <button class="pill" data-region="亞洲">亞洲</button>
        <button class="pill" data-region="歐洲">歐洲</button>
        <button class="pill" data-region="美洲">美洲</button>
        <button class="pill" data-region="非洲">非洲</button>
        <button class="pill" data-region="大洋洲">大洋洲</button>
        <button class="pill" data-region="極地">極地</button>
      </div>
    </div>
    <div id="episode-list"></div>
  </aside>

  <!-- ── Overlay (mobile) ── -->
  <div id="overlay"></div>

  <!-- Scripts -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <script src="js/app.js?v=20"></script>
</body>
</html>
