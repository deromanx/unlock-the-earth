name: Update Episodes from RSS

on:
  schedule:
    - cron: '0 2 * * 3'   # 每週三 10:00 台灣時間
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'

      - name: Fetch RSS → episodes.json
        run: python scripts/fetch_rss.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/episodes.json
          git diff --cached --quiet && echo "no changes" || \
            git commit -m "chore: update episodes from RSS" && git push
