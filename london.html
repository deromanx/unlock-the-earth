<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Craig 的倫敦 — 解鎖地球</title>
  <meta name="description" content="解鎖地球 × Craig：倫敦藍牌導覽員帶你探索倫敦歷史地標。">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔴</text></svg>">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Klee+One:wght@400;600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=20">
  <style>
    /* London page overrides */
    :root {
      --accent: #cc2936;
      --accent-hover: #e8303f;
    }
    .logo-globe { font-size: 22px; }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text-2);
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-3);
      transition: color 0.2s, border-color 0.2s;
      text-decoration: none;
    }
    .back-btn:hover { color: var(--text); border-color: var(--text-2); }

    /* Landmark marker */
    .lm-marker {
      width: 28px; height: 28px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      background: var(--accent, #cc2936);
      border: 2px solid rgba(255,255,255,0.3);
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      cursor: pointer;
      transition: transform 0.15s;
      position: relative;
    }
    /* 擴展觸控面積到 44×44px（Apple HIG 建議） */
    .lm-marker::before {
      content: '';
      position: absolute;
      inset: -10px;
    }
    .lm-marker:hover { transform: rotate(-45deg) scale(1.2); }
    .lm-marker.active-marker { background: #e8a020; }
    .lm-num {
      position: absolute;
      top: 50%; left: 50%;
      transform: rotate(45deg) translate(-60%, -50%);
      font-size: 11px; font-weight: 700;
      color: #fff;
    }

    /* Landmark popup */
    .lm-popup { padding: 14px 16px; }
    .lm-popup-header { margin-bottom: 8px; }
    .lm-name { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.3; }
    .lm-name-en { font-size: 12px; color: var(--text-2); margin-top: 2px; }
    .lm-reason {
      font-size: 12px; color: var(--text);
      background: rgba(204,41,54,0.12);
      border-left: 3px solid var(--accent, #cc2936);
      padding: 6px 10px;
      border-radius: 0 6px 6px 0;
      margin-bottom: 10px;
    }
    .lm-eps-label { font-size: 11px; color: var(--text-3); margin-bottom: 5px; }
    .lm-ep-pills { display: flex; flex-wrap: wrap; gap: 5px; }
    .lm-ep-pill {
      font-size: 11px; font-weight: 600;
      padding: 4px 9px;
      border-radius: 20px;
      background: rgba(204,41,54,0.15);
      color: #e87c85;
      border: 1px solid rgba(204,41,54,0.3);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .lm-ep-pill:hover { background: rgba(204,41,54,0.3); }

    /* Episode card accent for London */
    .ep-num { background: rgba(204,41,54,0.15); color: #e87c85; }

    /* Sidebar landmark list */
    .lm-card {
      display: flex; gap: 10px;
      padding: 10px 16px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .lm-card:hover { background: var(--bg-3); }
    .lm-card.active { background: rgba(204,41,54,0.08); border-left: 2px solid #cc2936; }
    .lm-num-badge {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: #cc2936;
      color: #fff;
      font-size: 12px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .lm-card-info { flex: 1; min-width: 0; }
    .lm-card-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .lm-card-en { font-size: 11px; color: var(--text-3); margin-bottom: 3px; }
    .lm-card-reason { font-size: 11px; color: var(--text-2); }
    .lm-card-eps { margin-top: 5px; display: flex; gap: 4px; flex-wrap: wrap; }
    .lm-card-ep { font-size: 10px; color: #e87c85; background: rgba(204,41,54,0.12); padding: 1px 5px; border-radius: 4px; }

    /* Quote blocks */
    .lm-quote-block { margin-bottom: 10px; }
    .lm-quote {
      font-size: 12px; color: var(--text);
      background: rgba(255,255,255,0.04);
      border-left: 3px solid #cc2936;
      padding: 6px 10px;
      border-radius: 0 6px 6px 0;
      margin: 5px 0 3px;
      font-style: italic;
      line-height: 1.5;
    }
    .lm-context { font-size: 11px; color: var(--text-2); padding-left: 2px; }
    .source-badge {
      font-size: 10px; font-weight: 600;
      padding: 2px 6px; border-radius: 4px;
    }
    .source-badge.transcript { background: rgba(204,41,54,0.2); color: #e87c85; }
    .source-badge.topic { background: rgba(100,100,100,0.2); color: var(--text-3); }

    .section-tabs {
      display: flex; gap: 0;
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      margin-top: 8px;
    }
    .tab {
      font-size: 12px; font-weight: 500;
      padding: 8px 14px;
      color: var(--text-2);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab.active { color: #cc2936; border-bottom-color: #cc2936; }

    .disclaimer {
      margin: 8px 16px;
      font-size: 11px;
      color: var(--text-3);
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <!-- ── Header ── -->
  <header id="header">
    <div class="logo">
      <img src="assets/logo-circle.png" alt="解鎖地球" class="logo-img">
      <div class="logo-text">
        <span class="logo-title" style="color:#cc2936">Craig 的倫敦</span>
        <span class="logo-sub">解鎖地球 × 藍牌導覽員</span>
      </div>
    </div>
    <div class="header-right">
      <div class="stats">
        <span class="stat" id="stat-lm">— 個地標</span>
        <span class="stat-sep">·</span>
        <span class="stat" id="stat-eps">— 集</span>
      </div>
      <a href="index.html" class="back-btn">← 返回世界地圖</a>
      <button id="theme-toggle" class="btn-icon" aria-label="切換主題" title="切換 Dark / Light 模式">
        <svg id="icon-moon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg id="icon-sun" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
      <button id="toggle-panel" class="btn-list" aria-label="開啟列表">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
          <line x1="8" y1="18" x2="21" y2="18"/>
          <circle cx="3" cy="6" r="1" fill="currentColor"/><circle cx="3" cy="12" r="1" fill="currentColor"/>
          <circle cx="3" cy="18" r="1" fill="currentColor"/>
        </svg>
        地標 & 集數
      </button>
    </div>
  </header>

  <!-- ── Map ── -->
  <div id="map"></div>

  <!-- ── Panel ── -->
  <aside id="panel">
    <div class="panel-header">
      <div class="panel-title-row">
        <h2>Craig 的倫敦地圖</h2>
        <button id="close-panel" aria-label="關閉">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="section-tabs">
      <div class="tab active" data-tab="landmarks">倫敦地標</div>
      <div class="tab" data-tab="episodes">Craig 集數</div>
    </div>

    <div class="disclaimer">
      ℹ️ 地標關聯以集數主題為依據，為主題性標注而非逐字稿引用。
    </div>

    <div id="ep-filter" class="ep-filter-row"></div>
    <div id="panel-landmarks" class="tab-content episode-list"></div>
    <div id="panel-episodes" class="tab-content episode-list" style="display:none"></div>
  </aside>

  <!-- ── Overlay ── -->
  <div id="overlay"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="js/london.js?v=6"></script>
</body>
</html>
